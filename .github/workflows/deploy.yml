name: CI/CD Docker Hub Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USER }}/devops-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ env.TAG }} -t $IMAGE_NAME:latest .

      - name: Push Docker Image (versioned)
        run: |
          docker push $IMAGE_NAME:${{ env.TAG }}
          docker push $IMAGE_NAME:latest

    outputs:
      tag: ${{ env.TAG }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USER }}/devops-app:latest

            docker pull $IMAGE

            docker stop devops-app || true
            docker rm devops-app || true

            docker run -d \
              --restart unless-stopped \
              -p 80:5000 \
              --name devops-app \
              $IMAGE
